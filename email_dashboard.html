<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Dashboard - AI Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .header-title i {
            font-size: 2.5rem;
            color: var(--primary-color);
        }
        
        .header-title h1 {
            margin: 0;
            color: #333;
            font-size: 1.8rem;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }
        
        .sidebar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            height: fit-content;
        }
        
        .content-area {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .compose-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            margin-bottom: 20px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .compose-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .nav-menu li {
            margin-bottom: 5px;
        }
        
        .nav-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 8px;
            color: #555;
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .nav-menu a:hover,
        .nav-menu a.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }
        
        .nav-menu i {
            width: 20px;
            text-align: center;
        }
        
        .badge-count {
            margin-left: auto;
            background: var(--danger-color);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .email-list {
            max-height: 600px;
            overflow-y: auto;
        }
        
        .email-item {
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .email-item:hover {
            background: #f5f5f5;
            border-color: var(--primary-color);
            transform: translateX(5px);
        }
        
        .email-item.unread {
            background: #e8f4fd;
            border-left: 4px solid var(--primary-color);
        }
        
        .email-sender {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .email-subject {
            color: #666;
            margin-bottom: 5px;
        }
        
        .email-preview {
            color: #999;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .email-time {
            color: #999;
            font-size: 0.85rem;
        }
        
        .email-detail {
            display: none;
        }
        
        .email-detail.active {
            display: block;
        }
        
        .email-header {
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        
        .email-body {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            min-height: 200px;
            line-height: 1.6;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn-action {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-reply {
            background: var(--primary-color);
            color: white;
            border: none;
        }
        
        .btn-reply:hover {
            background: var(--secondary-color);
        }
        
        .btn-archive {
            background: var(--success-color);
            color: white;
            border: none;
        }
        
        .btn-delete {
            background: var(--danger-color);
            color: white;
            border: none;
        }
        
        .compose-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .compose-modal.active {
            display: flex;
        }
        
        .compose-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .compose-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .compose-body {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }
        
        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 10px 15px;
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        textarea.form-control {
            min-height: 200px;
            resize: vertical;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-card i {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .stat-card .stat-number {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .stat-card .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="header-bar">
            <div class="header-title">
                <i class="fas fa-envelope"></i>
                <div>
                    <h1>Email Dashboard</h1>
                    <small class="text-muted">Manage your emails with AI Employee</small>
                </div>
            </div>
            <div>
                <button class="btn btn-outline-primary" onclick="refreshInbox()">
                    <i class="fas fa-sync-alt me-2"></i>Refresh
                </button>
                <a href="/dashboard" class="btn btn-outline-secondary ms-2">
                    <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                </a>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <button class="compose-btn" onclick="openCompose()">
                    <i class="fas fa-plus-circle me-2"></i>Compose Email
                </button>
                
                <ul class="nav-menu">
                    <li>
                        <a href="#" class="active" onclick="showInbox()">
                            <i class="fas fa-inbox"></i>
                            <span>Inbox</span>
                            <span class="badge-count" id="inboxCount">0</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="showSent()">
                            <i class="fas fa-paper-plane"></i>
                            <span>Sent</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="refreshInbox()">
                            <i class="fas fa-sync-alt"></i>
                            <span>Refresh</span>
                        </a>
                    </li>
                </ul>
                
                <hr>
                
                <div class="mt-3">
                    <h6 class="text-muted mb-3">Quick Stats</h6>
                    <div class="quick-stats">
                        <div class="stat-card" style="background: linear-gradient(135deg, #10b981, #059669);">
                            <i class="fas fa-inbox"></i>
                            <div class="stat-number" id="totalInbox">0</div>
                            <div class="stat-label">Inbox</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                            <i class="fas fa-paper-plane"></i>
                            <div class="stat-number" id="totalSent">0</div>
                            <div class="stat-label">Sent</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
                            <i class="fas fa-star"></i>
                            <div class="stat-number" id="totalUnread">0</div>
                            <div class="stat-label">Unread</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Content Area -->
            <div class="content-area">
                <!-- Loading Spinner -->
                <div class="loading-spinner" id="loadingSpinner">
                    <div class="spinner"></div>
                    <p>Loading emails...</p>
                </div>
                
                <!-- Email List -->
                <div id="emailList" class="email-list">
                    <!-- Emails will be loaded here -->
                </div>
                
                <!-- Email Detail -->
                <div id="emailDetail" class="email-detail">
                    <!-- Email detail will be shown here -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Compose Modal -->
    <div class="compose-modal" id="composeModal">
        <div class="compose-content">
            <div class="compose-header">
                <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Compose Email</h4>
                <button type="button" class="btn-close btn-close-white" onclick="closeCompose()"></button>
            </div>
            <div class="compose-body">
                <form id="composeForm">
                    <div class="form-group">
                        <label><i class="fas fa-user me-2"></i>To:</label>
                        <input type="email" class="form-control" id="composeTo" placeholder="recipient@example.com" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-copy me-2"></i>CC (optional):</label>
                        <input type="email" class="form-control" id="composeCc" placeholder="cc@example.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-heading me-2"></i>Subject:</label>
                        <input type="text" class="form-control" id="composeSubject" placeholder="Email subject" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-align-left me-2"></i>Message:</label>
                        <textarea class="form-control" id="composeBody" placeholder="Type your message here..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-paperclip me-2"></i>Attachments:</label>
                        <input type="file" class="form-control" id="composeAttachments" multiple>
                        <small class="text-muted">You can select multiple files</small>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-paper-plane me-2"></i>Send Email
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="closeCompose()">
                            <i class="fas fa-times me-2"></i>Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentEmails = [];
        let currentView = 'inbox';
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadEmails();
            updateStats();
        });
        
        // Load emails
        function loadEmails() {
            showLoading(true);
            
            fetch('/api/demo/emails')
                .then(response => response.json())
                .then(data => {
                    currentEmails = data.emails || [];
                    renderEmailList();
                    updateStats();
                    showLoading(false);
                })
                .catch(error => {
                    console.error('Error loading emails:', error);
                    showLoading(false);
                    document.getElementById('emailList').innerHTML = `
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            Error loading emails. Please try again.
                        </div>
                    `;
                });
        }
        
        // Render email list
        function renderEmailList() {
            const emailList = document.getElementById('emailList');
            
            if (currentEmails.length === 0) {
                emailList.innerHTML = `
                    <div class="text-center text-muted" style="padding: 60px 20px;">
                        <i class="fas fa-inbox" style="font-size: 4rem; opacity: 0.3;"></i>
                        <h4 class="mt-3">No emails yet</h4>
                        <p>Click "Compose Email" to send your first email</p>
                    </div>
                `;
                return;
            }
            
            emailList.innerHTML = currentEmails.map((email, index) => `
                <div class="email-item ${email.unread ? 'unread' : ''}" onclick="viewEmail(${index})">
                    <div class="d-flex justify-content-between align-items-start">
                        <div style="flex: 1;">
                            <div class="email-sender">${email.from}</div>
                            <div class="email-subject">${email.subject}</div>
                            <div class="email-preview">${email.body.substring(0, 100)}...</div>
                        </div>
                        <div class="email-time">${formatTime(email.timestamp)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // View email
        function viewEmail(index) {
            const email = currentEmails[index];
            const emailDetail = document.getElementById('emailDetail');
            const emailList = document.getElementById('emailList');
            
            emailList.style.display = 'none';
            emailDetail.classList.add('active');
            
            emailDetail.innerHTML = `
                <div class="email-header">
                    <h3>${email.subject}</h3>
                    <div class="mt-2">
                        <strong>From:</strong> ${email.from} | 
                        <strong>To:</strong> ${email.to} | 
                        <strong>Date:</strong> ${formatTime(email.timestamp)}
                    </div>
                </div>
                <div class="email-body">
                    ${email.body.replace(/\n/g, '<br>')}
                </div>
                <div class="action-buttons">
                    <button class="btn btn-reply btn-action" onclick="replyEmail('${email.from}', '${email.subject}')">
                        <i class="fas fa-reply me-2"></i>Reply
                    </button>
                    <button class="btn btn-archive btn-action" onclick="archiveEmail(${index})">
                        <i class="fas fa-archive me-2"></i>Archive
                    </button>
                    <button class="btn btn-delete btn-action" onclick="deleteEmail(${index})">
                        <i class="fas fa-trash me-2"></i>Delete
                    </button>
                    <button class="btn btn-secondary btn-action ms-auto" onclick="backToList()">
                        <i class="fas fa-arrow-left me-2"></i>Back
                    </button>
                </div>
            `;
        }
        
        // Back to list
        function backToList() {
            document.getElementById('emailList').style.display = 'block';
            document.getElementById('emailDetail').classList.remove('active');
        }
        
        // Open compose modal
        function openCompose() {
            document.getElementById('composeModal').classList.add('active');
        }
        
        // Close compose modal
        function closeCompose() {
            document.getElementById('composeModal').classList.remove('active');
            document.getElementById('composeForm').reset();
        }
        
        // Send REAL email with attachments
        document.getElementById('composeForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Create FormData object for file upload
            const formData = new FormData();
            formData.append('to', document.getElementById('composeTo').value);
            formData.append('cc', document.getElementById('composeCc').value);
            formData.append('subject', document.getElementById('composeSubject').value);
            formData.append('body', document.getElementById('composeBody').value);
            
            // Add attachments
            const attachmentInput = document.getElementById('composeAttachments');
            if (attachmentInput.files.length > 0) {
                for (let i = 0; i < attachmentInput.files.length; i++) {
                    formData.append('attachments', attachmentInput.files[i]);
                }
            }

            // Show sending status
            const sendBtn = this.querySelector('button[type="submit"]');
            const originalText = sendBtn.innerHTML;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Sending...';
            sendBtn.disabled = true;

            // First try REAL email with attachments, fallback to demo
            fetch('/api/real/send-email', {
                method: 'POST',
                body: formData
                // Don't set Content-Type header - browser will set it automatically for FormData
            })
            .then(response => response.json())
            .then(data => {
                sendBtn.innerHTML = originalText;
                sendBtn.disabled = false;

                if (data.status === 'success') {
                    const attachmentCount = attachmentInput.files.length;
                    let msg = '✅ Real email sent successfully to ' + data.to + '!';
                    if (attachmentCount > 0) {
                        msg += '\n\n📎 Attachments sent: ' + attachmentCount + ' file(s)';
                    }
                    alert(msg);
                    closeCompose();
                    loadEmails();
                    loadSentEmails();
                } else if (data.status === 'demo') {
                    // Fallback to demo mode
                    alert('ℹ️ Demo mode: ' + data.message);
                    closeCompose();
                    loadEmails();
                    loadSentEmails();
                } else {
                    alert('❌ Failed: ' + data.message);
                }
            })
            .catch(error => {
                sendBtn.innerHTML = originalText;
                sendBtn.disabled = false;
                alert('❌ Error: ' + error.message);
            });
        });
        
        // Reply to email
        function replyEmail(to, subject) {
            closeCompose();
            document.getElementById('composeTo').value = to;
            document.getElementById('composeSubject').value = 'Re: ' + subject.replace('Re: ', '');
            document.getElementById('composeBody').focus();
        }

        // Archive email
        function archiveEmail(index) {
            alert('Email archived!');
            backToList();
        }

        // Delete email
        function deleteEmail(index) {
            if (confirm('Are you sure you want to delete this email?')) {
                currentEmails.splice(index, 1);
                renderEmailList();
                updateStats();
                backToList();
            }
        }

        // Load sent emails
        function loadSentEmails() {
            showLoading(true);
            
            fetch('/api/sent/emails')
                .then(response => response.json())
                .then(data => {
                    currentEmails = data.emails || [];
                    renderEmailList();
                    updateStats();
                    showLoading(false);
                })
                .catch(error => {
                    console.error('Error loading sent emails:', error);
                    showLoading(false);
                    document.getElementById('emailList').innerHTML = `
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            Error loading sent emails. Please try again.
                        </div>
                    `;
                });
        }
        
        // Update stats
        function updateStats() {
            const inboxCount = currentView === 'inbox' ? currentEmails.length : document.getElementById('inboxCount').textContent;
            const sentCount = currentView === 'sent' ? currentEmails.length : document.getElementById('totalSent').textContent;
            const unreadCount = currentEmails.filter(e => e.unread).length;
            
            document.getElementById('inboxCount').textContent = inboxCount;
            document.getElementById('totalInbox').textContent = inboxCount;
            document.getElementById('totalSent').textContent = sentCount;
            document.getElementById('totalUnread').textContent = unreadCount;
        }
        
        // Show loading
        function showLoading(show) {
            const spinner = document.getElementById('loadingSpinner');
            const emailList = document.getElementById('emailList');
            
            if (show) {
                spinner.classList.add('active');
                emailList.style.display = 'none';
            } else {
                spinner.classList.remove('active');
                emailList.style.display = 'block';
            }
        }
        
        // Format time
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const hours = Math.floor(diff / (1000 * 60 * 60));
            
            if (hours < 1) {
                return 'Just now';
            } else if (hours < 24) {
                return `${hours}h ago`;
            } else {
                return date.toLocaleDateString();
            }
        }
        
        // Refresh inbox
        function refreshInbox() {
            loadEmails();
        }
        
        // Navigation functions
        function showInbox() {
            currentView = 'inbox';
            loadEmails();
        }
        
        function showSent() {
            currentView = 'sent';
            loadSentEmails();
        }
        
        // Load sent emails
        function loadSentEmails() {
            showLoading(true);
            
            fetch('/api/sent/emails')
                .then(response => response.json())
                .then(data => {
                    currentEmails = data.emails || [];
                    renderEmailList();
                    updateStats();
                    showLoading(false);
                })
                .catch(error => {
                    console.error('Error loading sent emails:', error);
                    showLoading(false);
                    document.getElementById('emailList').innerHTML = `
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            Error loading sent emails. Please try again.
                        </div>
                    `;
                });
        }
        
        function showDemoMode() {
            window.location.href = '/demo-email';
        }
        
        // Debug function - check in browser console
        console.log('Email Dashboard Loaded v2.0 - Sent Folder Fixed');
        console.log('Inbox API: /api/demo/emails');
