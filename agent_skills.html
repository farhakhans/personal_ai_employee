<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Skills - Personal AI Employee</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        .container { display: flex; min-height: 100vh; }
        
        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #2d3748 0%, #1a202c 100%);
            color: white;
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2);
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .nav-menu { list-style: none; }
        .nav-item { margin: 10px 0; }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: #cbd5e0;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .nav-link:hover {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            transform: translateX(5px);
        }
        .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        /* MAIN CONTENT */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 30px;
        }
        
        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .header h1 { font-size: 28px; color: #2d3748; }
        
        /* SKILLS GRID */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .skill-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .skill-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        
        .skill-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .skill-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .skill-name {
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
        }
        
        .skill-description {
            color: #718096;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .skill-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #718096;
        }
        
        .skill-meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-approval { background: #feebc8; color: #7c2d12; }
        .badge-no-approval { background: #c6f6d5; color: #22543d; }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .modal-header h2 {
            font-size: 24px;
            color: #2d3748;
        }
        
        .close-btn {
            font-size: 28px;
            cursor: pointer;
            color: #718096;
            background: none;
            border: none;
            padding: 0;
            width: 30px;
            height: 30px;
        }
        .close-btn:hover {
            color: #2d3748;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .result-box {
            background: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .result-box pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 13px;
            color: #2d3748;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }
        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #feb2b2;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="logo">🤖 AI Employee</div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/main-dashboard" class="nav-link">
                        <span>📊</span> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="javascript:void(0)" onclick="navigateWithToken('/payments')" class="nav-link">
                        <span>💰</span> Payments
                    </a>
                </li>
                <li class="nav-item">
                    <a href="javascript:void(0)" onclick="navigateWithToken('/customers')" class="nav-link">
                        <span>👥</span> Customers
                    </a>
                </li>
                <li class="nav-item">
                    <a href="javascript:void(0)" onclick="navigateWithToken('/employees')" class="nav-link">
                        <span>👨‍💼</span> Employees
                    </a>
                </li>
                <li class="nav-item">
                    <a href="javascript:void(0)" onclick="navigateWithToken('/reports')" class="nav-link">
                        <span>📈</span> Reports
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/agent-skills" class="nav-link active">
                        <span>🤖</span> Agent Skills
                    </a>
                </li>
                <li class="nav-item">
                    <a href="javascript:void(0)" onclick="navigateWithToken('/notifications')" class="nav-link">
                        <span>🔔</span> Notifications
                    </a>
                </li>
                <li class="nav-item">
                    <a href="javascript:void(0)" onclick="navigateWithToken('/settings')" class="nav-link">
                        <span>⚙️</span> Settings
                    </a>
                </li>
            </ul>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- HEADER -->
            <div class="header">
                <h1>🤖 Agent Skills</h1>
                <div style="font-size: 14px; color: #718096;">
                    AI-Powered Automation Capabilities
                </div>
            </div>

            <!-- ERROR MESSAGE AREA -->
            <div id="errorContainer" style="display: none; margin-bottom: 20px;"></div>

            <!-- LOADING -->
            <div id="loading" style="text-align: center; padding: 50px;">
                <div class="loading" style="width: 40px; height: 40px; border-color: rgba(102, 126, 234, 0.3); border-top-color: #667eea;"></div>
                <p style="margin-top: 20px; color: white;">Loading Agent Skills...</p>
            </div>

            <!-- SKILLS GRID -->
            <div id="skillsGrid" class="skills-grid" style="display: none;"></div>
        </div>
    </div>

    <!-- EXECUTION MODAL -->
    <div id="executionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Execute Skill</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <div id="modalAlert"></div>
            
            <div id="modalForm">
                <div class="form-group">
                    <label>File Path (for Vault skills)</label>
                    <input type="text" id="filePath" placeholder="e.g., Plans/PLAN_001.md">
                </div>
                
                <div class="form-group">
                    <label>Content (for Write skills)</label>
                    <textarea id="content" rows="4" placeholder="Enter content to write..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>Mode</label>
                    <select id="mode">
                        <option value="w">Write (Overwrite)</option>
                        <option value="a">Append</option>
                    </select>
                </div>
                
                <button class="btn btn-primary" id="executeBtn" onclick="executeSkill()">
                    Execute Skill
                </button>
            </div>
            
            <div id="resultBox" class="result-box" style="display: none;">
                <h3 style="margin-bottom: 10px; font-size: 16px;">Result:</h3>
                <pre id="resultContent"></pre>
            </div>
        </div>
    </div>

    <script>
        let currentSkill = null;
        
        // Get token from multiple sources: localStorage, URL query, or hash
        function getToken() {
            // 1. Check localStorage
            let token = localStorage.getItem('accessToken') || localStorage.getItem('auth_token');
            if (token) {
                console.log('✓ Token from localStorage:', token.substring(0, 20) + '...');
                return token;
            }
            
            // 2. Check URL query parameter
            const urlParams = new URLSearchParams(window.location.search);
            token = urlParams.get('token');
            if (token) {
                console.log('✓ Token from URL:', token.substring(0, 20) + '...');
                // Save it for future use
                localStorage.setItem('accessToken', token);
                // Remove token from URL (clean up)
                window.history.replaceState({}, document.title, window.location.pathname);
                return token;
            }
            
            // 3. Check URL hash
            token = window.location.hash.substring(1);
            if (token && token.includes('token=')) {
                token = token.split('token=')[1].split('&')[0];
                console.log('✓ Token from URL hash:', token.substring(0, 20) + '...');
                localStorage.setItem('accessToken', token);
                return token;
            }
            
            console.log('ℹ️ No token found - will load skills without authentication');
            return null;
        }
        
        let authToken = getToken();
        
        // Navigate with token
        function navigateWithToken(path) {
            const token = authToken || localStorage.getItem('accessToken');
            if (token) {
                window.location.href = `${path}?token=${token}`;
            } else {
                alert('⚠️ Please login first to access this page.');
                window.location.href = '/login-page';
            }
        }
        
        // Load skills on page load (with or without token)
        document.addEventListener('DOMContentLoaded', loadSkills);

        function showLoginRequired() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('skillsGrid').style.display = 'none';
            document.getElementById('errorContainer').innerHTML = `
                <div class="alert alert-error" style="font-size: 16px; text-align: center; padding: 30px;">
                    <h3 style="margin-bottom: 15px;">🔐 Login Required</h3>
                    <p style="margin-bottom: 20px;">You need to login first to access Agent Skills.</p>
                    <button onclick="window.location.href='/login-page'" class="btn btn-primary" style="width: auto; display: inline-block; padding: 12px 30px;">
                        Go to Login →
                    </button>
                </div>
            `;
            document.getElementById('errorContainer').style.display = 'block';
        }

        async function loadSkills() {
            console.log('🔍 Loading Agent Skills...');
            console.log('Token present:', !!authToken);
            console.log('Token value:', authToken ? authToken.substring(0, 20) + '...' : 'NONE');

            try {
                const response = await fetch('/api/agent/skills', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                console.log('Response status:', response.status);

                const data = await response.json();
                console.log('Response data:', data);

                document.getElementById('loading').style.display = 'none';

                if (data.status === 'success') {
                    console.log('✓ Skills loaded:', Object.keys(data.skills).length);
                    renderSkills(data.skills);
                } else if (data.error && data.error.includes('Token')) {
                    // Token is invalid or missing
                    alert('⚠️ Session expired! Please login again.');
                    window.location.href = '/login-page';
                } else {
                    showError('Failed to load skills: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('❌ Error loading skills:', error);
                document.getElementById('loading').style.display = 'none';
                showError('Error connecting to server: ' + error.message);
            }
        }
        
        function renderSkills(skills) {
            const grid = document.getElementById('skillsGrid');
            grid.style.display = 'grid';

            const skillIcons = {
                'VaultRead': '📖',
                'VaultWrite': '✍️',
                'EmailTriage': '📧',
                'DraftResponse': '📝',
                'RequestApproval': '✅',
                'CreatePlan': '📋'
            };

            grid.innerHTML = Object.entries(skills).map(([name, skill]) => `
                <div class="skill-card">
                    <div class="skill-header">
                        <div class="skill-icon">${skillIcons[name] || '🤖'}</div>
                        <div class="skill-name">${skill.name}</div>
                    </div>
                    <div class="skill-description">${skill.description}</div>
                    <div class="skill-meta">
                        <div class="skill-meta-item">
                            <span>Executions: ${skill.execution_count || 0}</span>
                        </div>
                        <div class="skill-meta-item">
                            <span class="badge ${skill.requires_approval ? 'badge-approval' : 'badge-no-approval'}">
                                ${skill.requires_approval ? '⚠️ Manual Approval' : '✅ Auto-Execute'}
                            </span>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="openExecutionModal('${skill.name}')">
                        Execute Skill
                    </button>
                </div>
            `).join('');
        }
        
        function openExecutionModal(skillName) {
            currentSkill = skillName;
            document.getElementById('modalTitle').textContent = `Execute: ${skillName}`;
            document.getElementById('executionModal').classList.add('active');
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('modalAlert').innerHTML = '';
            
            // Show/hide fields based on skill
            const filePathField = document.getElementById('filePath').parentElement;
            const contentField = document.getElementById('content').parentElement;
            const modeField = document.getElementById('mode').parentElement;
            
            if (skillName.includes('Read')) {
                filePathField.style.display = 'block';
                contentField.style.display = 'none';
                modeField.style.display = 'none';
            } else if (skillName.includes('Write')) {
                filePathField.style.display = 'block';
                contentField.style.display = 'block';
                modeField.style.display = 'block';
            } else {
                filePathField.style.display = 'none';
                contentField.style.display = 'none';
                modeField.style.display = 'none';
            }
        }
        
        function closeModal() {
            document.getElementById('executionModal').classList.remove('active');
            currentSkill = null;
        }
        
        async function executeSkill() {
            const btn = document.getElementById('executeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Executing...';
            
            try {
                const context = {};
                
                if (currentSkill.includes('Read') || currentSkill.includes('Write')) {
                    context.file_path = document.getElementById('filePath').value;
                }
                
                if (currentSkill.includes('Write')) {
                    context.content = document.getElementById('content').value;
                    context.mode = document.getElementById('mode').value;
                }
                
                const response = await fetch(`/api/agent/skills/${currentSkill}/execute`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(context)
                });
                
                const result = await response.json();
                
                document.getElementById('resultBox').style.display = 'block';
                document.getElementById('resultContent').textContent = JSON.stringify(result, null, 2);
                
                if (result.success) {
                    showSuccess('Skill executed successfully!');
                } else {
                    showError(result.error || 'Execution failed');
                }
                
            } catch (error) {
                showError('Error executing skill: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Execute Skill';
            }
        }
        
        function showSuccess(message) {
            document.getElementById('modalAlert').innerHTML = `
                <div class="alert alert-success">${message}</div>
            `;
        }
        
        function showError(message) {
            document.getElementById('modalAlert').innerHTML = `
                <div class="alert alert-error">${message}</div>
            `;
        }
        
        // Close modal when clicking outside
        document.getElementById('executionModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
