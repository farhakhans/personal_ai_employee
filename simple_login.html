<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Login - AI Employee</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;padding:35px;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.3);width:100%;max-width:420px}
h1{color:#333;margin-bottom:8px;text-align:center;font-size:22px}
p{color:#666;text-align:center;margin-bottom:25px;font-size:13px}
.fg{margin-bottom:18px}
.lbl{display:block;margin-bottom:6px;color:#333;font-weight:600;font-size:13px}
.inp{width:100%;padding:11px 13px;border:2px solid #e0e0e0;border-radius:7px;font-size:14px;transition:border .3s}
.inp:focus{outline:none;border-color:#667eea}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:7px;font-size:15px;font-weight:600;cursor:pointer;transition:transform .2s}
.btn:hover{transform:translateY(-2px)}
.btn:disabled{opacity:.7;cursor:not-allowed;transform:none}
.msg{padding:11px;border-radius:7px;margin-bottom:18px;font-size:13px;display:none}
.ok{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.err{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.demo{background:#f8f9fa;padding:13px;border-radius:7px;margin-top:18px}
.demo h4{font-size:13px;color:#333;margin-bottom:8px}
.dr{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid #e0e0e0}
.dr:last-child{border-bottom:none}
code{background:#e0e0e0;padding:2px 5px;border-radius:3px;font-family:monospace;font-size:11px}
</style>
</head>
<body>
<div class="box">
<h1>🤖 AI Employee Login</h1>
<p>Server: http://localhost:5000</p>
<div id="msg" class="msg"></div>
<form onsubmit="return doLogin(event)">
<div class="fg">
<label class="lbl">📧 Email</label>
<input class="inp" type="email" id="email" value="admin@employee.ai" required>
</div>
<div class="fg">
<label class="lbl">🔒 Password</label>
<input class="inp" type="password" id="password" value="Admin@2026!" required>
</div>
<button type="submit" class="btn" id="btn">🔑 Sign In</button>
</form>
<div class="demo">
<h4>📋 Demo Accounts:</h4>
<div class="dr"><span>👑 Admin</span><span><code>admin@employee.ai</code></span></div>
<div class="dr"><span>👔 Manager</span><span><code>manager@employee.ai</code></span></div>
<div class="dr"><span>👤 User</span><span><code>user@employee.ai</code></span></div>
<div style="margin-top:7px;font-size:11px;color:#666">
Passwords: <code>Admin@2026!</code> | <code>Manager@2026!</code> | <code>User@2026!</code>
</div>
</div>
</div>
<script>
function doLogin(e){
e.preventDefault();
const email=document.getElementById('email').value;
const password=document.getElementById('password').value;
const btn=document.getElementById('btn');
const msg=document.getElementById('msg');
btn.disabled=true;
btn.innerHTML='⏳ Signing in...';
msg.style.display='none';
fetch('http://localhost:5000/api/auth/login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({email,password})
})
.then(r=>r.json())
.then(data=>{
if(data.access_token){
localStorage.setItem('accessToken',data.access_token);
localStorage.setItem('refreshToken',data.refresh_token);
localStorage.setItem('user',JSON.stringify(data.user));
msg.className='msg ok';
msg.innerHTML='✅ Success! Redirecting...';
msg.style.display='block';
setTimeout(()=>{window.location.href='http://localhost:5000/status';},1200);
}else{
msg.className='msg err';
msg.innerHTML='❌ '+(data.error||'Login failed');
msg.style.display='block';
btn.disabled=false;
btn.innerHTML='🔑 Sign In';
}
})
.catch(err=>{
msg.className='msg err';
msg.innerHTML='❌ Connection error: '+err.message;
msg.style.display='block';
btn.disabled=false;
btn.innerHTML='🔑 Sign In';
});
return false;
}
// Check if already logged in - but don't auto-redirect on this page
var token=localStorage.getItem('accessToken');
if(token){
document.getElementById('msg').className='msg ok';
document.getElementById('msg').innerHTML='✅ Already logged in! Redirecting...';
document.getElementById('msg').style.display='block';
setTimeout(()=>{window.location.href='http://localhost:5000/status';},800);
}
</script>
</body>
</html>
