<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Test - Simple</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Export Data Test</h1>
        <button class="btn btn-primary btn-lg" onclick="showExportModal()">
            <i class="fas fa-file-export me-2"></i>Export Data
        </button>
        
        <div id="result" class="mt-3"></div>
    </div>

    <!-- Export Modal -->
    <div class="modal fade" id="exportModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Export Data</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Select export type:</p>
                    <div class="list-group">
                        <button class="list-group-item list-group-item-action" onclick="doExport('tasks')">
                            📋 Tasks (CSV)
                        </button>
                        <button class="list-group-item list-group-item-action" onclick="doExport('approvals')">
                            ✓ Approvals (CSV)
                        </button>
                        <button class="list-group-item list-group-item-action" onclick="doExport('system')">
                            ⚙️ System (JSON)
                        </button>
                        <button class="list-group-item list-group-item-action" onclick="doExport('emails')">
                            📧 Emails (CSV)
                        </button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Sample data
        const tasks = [
            { id: 1, title: 'Task 1', priority: 'high', completed: false },
            { id: 2, title: 'Task 2', priority: 'medium', completed: true }
        ];

        // Show modal
        function showExportModal() {
            console.log('Showing modal...');
            document.getElementById('result').innerHTML = '<div class="alert alert-info">Modal opening...</div>';
            const modal = new bootstrap.Modal(document.getElementById('exportModal'));
            modal.show();
        }

        // Do export - GLOBAL FUNCTION
        window.doExport = function(type) {
            console.log('Exporting:', type);
            document.getElementById('result').innerHTML = '<div class="alert alert-success">Exporting ' + type + '... Check downloads!</div>';
            
            if (type === 'tasks') {
                exportTasks();
            } else if (type === 'approvals') {
                exportApprovals();
            } else if (type === 'system') {
                exportSystem();
            } else if (type === 'emails') {
                exportEmails();
            }
            
            // Close modal
            const modal = bootstrap.Modal.getInstance(document.getElementById('exportModal'));
            if (modal) modal.hide();
        };

        function exportTasks() {
            let csv = "ID,Title,Priority,Completed\n";
            tasks.forEach(t => {
                csv += t.id + ',' + t.title + ',' + t.priority + ',' + t.completed + '\n';
            });
            download(csv, 'tasks.csv');
        }

        function exportApprovals() {
            let csv = "ID,Title,Status\n";
            csv += '1,Payment Request,Pending\n';
            csv += '2,Project Extension,Approved\n';
            download(csv, 'approvals.csv');
        }

        function exportSystem() {
            let json = JSON.stringify({ tasks: tasks, date: new Date() }, null, 2);
            download(json, 'system.json');
        }

        function exportEmails() {
            let csv = "ID,From,Subject\n";
            csv += '1,client@test.com,Hello\n';
            csv += '2,vendor@test.com,Invoice\n';
            download(csv, 'emails.csv');
        }

        function download(content, filename) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            console.log('Downloaded:', filename);
        }
    </script>
</body>
</html>
