<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Employee</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        h1 { color: #333; margin-bottom: 10px; text-align: center; font-size: 24px; }
        p { color: #666; text-align: center; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        input[type="email"], input[type="password"], input[type="text"] { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: border 0.3s; }
        input:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .demo { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .demo h4 { font-size: 14px; color: #333; margin-bottom: 10px; }
        .demo-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #e0e0e0; }
        .demo-row:last-child { border-bottom: none; }
        code { background: #e0e0e0; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🤖 AI Employee Login</h1>
        <p>Enter your credentials to continue</p>
        
        <div id="msg" class="message"></div>
        
        <form onsubmit="return doLogin(event)">
            <div class="form-group">
                <label for="email">📧 Email</label>
                <input type="email" id="email" value="admin@employee.ai" required>
            </div>
            
            <div class="form-group">
                <label for="password">🔒 Password</label>
                <input type="password" id="password" value="Admin@2026!" required>
            </div>
            
            <button type="submit" id="btn">🔑 Sign In</button>
        </form>
        
        <div class="demo">
            <h4>📋 Demo Accounts:</h4>
            <div class="demo-row">
                <span>👑 Admin</span>
                <span><code>admin@employee.ai</code></span>
            </div>
            <div class="demo-row">
                <span>👔 Manager</span>
                <span><code>manager@employee.ai</code></span>
            </div>
            <div class="demo-row">
                <span>👤 User</span>
                <span><code>user@employee.ai</code></span>
            </div>
            <div style="margin-top: 8px; font-size: 12px; color: #666;">
                Passwords: <code>Admin@2026!</code> | <code>Manager@2026!</code> | <code>User@2026!</code>
            </div>
        </div>
    </div>

    <script>
        function doLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            
            btn.disabled = true;
            btn.innerHTML = '⏳ Signing in...';
            msg.style.display = 'none';
            
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.access_token) {
                    localStorage.setItem('accessToken', data.access_token);
                    localStorage.setItem('refreshToken', data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    msg.className = 'message success';
                    msg.innerHTML = '✅ Success! Redirecting...';
                    msg.style.display = 'block';
                    setTimeout(() => { window.location.href = '/status'; }, 1000);
                } else {
                    msg.className = 'message error';
                    msg.innerHTML = '❌ ' + (data.error || 'Login failed');
                    msg.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '🔑 Sign In';
                }
            })
            .catch(err => {
                msg.className = 'message error';
                msg.innerHTML = '❌ Connection error: ' + err.message;
                msg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '🔑 Sign In';
            });
            return false;
        }
        
        // Check if already logged in
        const token = localStorage.getItem('accessToken');
        if (token) {
            window.location.href = '/status';
        }
    </script>
</body>
</html>
