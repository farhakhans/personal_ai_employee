<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Email Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f5f7fb; padding: 20px; }
        .card { box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; margin-bottom: 20px; }
        .toast-container { z-index: 1050; }
        .stat-card { background: white; border-radius: 12px; padding: 20px; border-left: 4px solid #4361ee; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <h1 class="mb-4">🤖 Personal AI Employee Dashboard</h1>
        
        <!-- Toast Container -->
        <div class="toast-container position-fixed top-0 end-0 p-3"></div>
        
        <!-- Stats Row -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <h5>System Status</h5>
                    <h3>✓ Healthy</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="border-left-color: #4cc9f0;">
                    <h5>Emails Received</h5>
                    <h3 id="emails-count">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="border-left-color: #f72585;">
                    <h5>Unread</h5>
                    <h3 id="unread-count">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="border-left-color: #1d3557;">
                    <h5>Uptime</h5>
                    <h3>99.9%</h3>
                </div>
            </div>
        </div>
        
        <!-- Live Email Inbox -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-inbox me-2 text-primary"></i> Live Email Inbox</h5>
                <div>
                    <span class="badge bg-warning" id="live-unread-count">0 Unread</span>
                    <button class="btn btn-sm btn-outline-primary ms-2" onclick="addEmail()">
                        <i class="fas fa-plus"></i> Test Email
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Status</th>
                                <th>From</th>
                                <th>Subject</th>
                                <th>Received</th>
                            </tr>
                        </thead>
                        <tbody id="live-inbox-tbody">
                            <tr>
                                <td colspan="4" class="text-center text-muted py-5">
                                    <i class="fas fa-inbox fa-3x mb-3 text-muted"></i>
                                    <p class="lead">Waiting for emails...</p>
                                    <p class="small">First email will arrive in 2 seconds</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Email storage
        let inboxEmails = [];
        let nextEmailId = 1;
        let audioContext = null;

        // Sample emails
        const sampleEmails = [
            { from: 'client@example.com', subject: 'Project Update Request', body: 'Could you provide an update?' },
            { from: 'manager@company.com', subject: 'Meeting Tomorrow', body: 'Meeting at 10am tomorrow.' },
            { from: 'support@vendor.com', subject: 'Invoice #12345', body: 'Your invoice is attached.' },
            { from: 'team@company.com', subject: 'Weekly Report', body: 'Please submit your report.' }
        ];

        // Show toast
        function showToast(message, type = 'info') {
            const toastId = `toast-${Date.now()}`;
            const colors = { success: 'bg-success', danger: 'bg-danger', warning: 'bg-warning', info: 'bg-info' };
            const icons = { success: '✓', danger: '!', warning: '⚠', info: 'ℹ' };
            
            const toastHTML = `
                <div id="${toastId}" class="toast" role="alert">
                    <div class="toast-header ${colors[type]} text-white">
                        <strong class="me-auto">${icons[type]} ${message}</strong>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            `;
            document.querySelector('.toast-container').insertAdjacentHTML('beforeend', toastHTML);
            const toast = new bootstrap.Toast(document.getElementById(toastId), { delay: 4000 });
            toast.show();
            setTimeout(() => document.getElementById(toastId)?.remove(), 4500);
        }

        // Play sound
        function playNotificationSound() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') audioContext.resume();
            
            const now = audioContext.currentTime;
            const osc1 = audioContext.createOscillator();
            const gain1 = audioContext.createGain();
            osc1.connect(gain1);
            gain1.connect(audioContext.destination);
            osc1.frequency.value = 880;
            gain1.gain.setValueAtTime(0.3, now);
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc1.start(now);
            osc1.stop(now + 0.3);
            
            const osc2 = audioContext.createOscillator();
            const gain2 = audioContext.createGain();
            osc2.connect(gain2);
            gain2.connect(audioContext.destination);
            osc2.frequency.value = 660;
            gain2.gain.setValueAtTime(0, now + 0.25);
            gain2.gain.linearRampToValueAtTime(0.3, now + 0.3);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
            osc2.start(now + 0.25);
            osc2.stop(now + 0.6);
            
            console.log('🔔 Sound played');
        }

        // Add email
        function addEmail() {
            const randomEmail = sampleEmails[Math.floor(Math.random() * sampleEmails.length)];
            const inboxEntry = {
                id: nextEmailId++,
                from: randomEmail.from,
                subject: randomEmail.subject,
                body: randomEmail.body,
                timestamp: new Date(),
                read: false
            };

            inboxEmails.push(inboxEntry);
            console.log('📧 Email added:', inboxEmails.length, 'total');

            showToast(`📧 New email from ${randomEmail.from.split('@')[0]}`, 'success');
            playNotificationSound();
            updateInboxDisplay();
        }

        // Update display
        function updateInboxDisplay() {
            const tbody = document.getElementById('live-inbox-tbody');
            if (!tbody) return;

            if (inboxEmails.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-5"><i class="fas fa-inbox fa-3x mb-3"></i><p>Waiting for emails...</p></td></tr>';
            } else {
                tbody.innerHTML = '';
                inboxEmails.slice(-10).reverse().forEach(email => {
                    const row = document.createElement('tr');
                    row.style.cursor = 'pointer';
                    const timeString = email.timestamp.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    row.innerHTML = `
                        <td><span class="badge ${email.read ? 'bg-secondary' : 'bg-warning'}">${email.read ? 'Read' : 'Unread'}</span></td>
                        <td>${email.from}</td>
                        <td>${email.subject}</td>
                        <td>${timeString}</td>
                    `;
                    row.addEventListener('click', () => {
                        email.read = true;
                        updateInboxDisplay();
                        updateStats();
                        alert(`From: ${email.from}\nSubject: ${email.subject}\n\n${email.body}`);
                    });
                    tbody.appendChild(row);
                });
            }

            // Update counts
            const unreadCount = inboxEmails.filter(e => !e.read).length;
            document.getElementById('unread-count').textContent = unreadCount;
            document.getElementById('emails-count').textContent = inboxEmails.length;
            document.getElementById('live-unread-count').textContent = `${unreadCount} Unread`;
        }

        // Initialize audio on first click
        document.addEventListener('click', function initAudio() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') audioContext.resume();
            console.log('🎵 Audio initialized');
        }, { once: true });

        // Auto-add emails
        setTimeout(addEmail, 2000);
        setInterval(addEmail, 10000);

        // Initial display
        updateInboxDisplay();
    </script>
</body>
</html>
